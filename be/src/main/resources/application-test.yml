# Profile `test`: chạy BE local không cần MySQL (H2 in-memory).
# Chạy: SPRING_PROFILES_ACTIVE=test ./mvnw spring-boot:run
spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:deutsch;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
