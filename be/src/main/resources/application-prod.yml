# Profile prod: JWT secret bắt buộc mạnh; schema chỉ qua Flyway + Hibernate validate.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # Khi không có DATABASE_URL: host external (*.render.com) cần PG_SSLMODE=require; local/docker thường prefer/disable.
    url: jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${DB_NAME:deutsch_db}?sslmode=${PG_SSLMODE:prefer}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  security:
    enforce-strong-jwt-secret: true
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://your-frontend.example}
