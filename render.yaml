# Blueprint Render: đẩy repo lên GitHub → Dashboard Render → Blueprint → chọn repo → Apply.
# PostgreSQL free (cùng workspace) được nối qua DATABASE_URL; backend tự chuyển sang JDBC.
# Nếu tạo BE tay (không Blueprint): vào Web Service → Environment → Add → From database → chọn Postgres
# để có DATABASE_URL; hoặc dán Internal Database URL vào biến DATABASE_URL. Thiếu URL → app nối localhost:5432 và lỗi.
# connectionString đôi khi chỉ có host cụt dpg-…-a — BE cần RENDER_POSTGRES_HOST_SUFFIX = region-postgres.render.com (khớp region DB).
# Trên service BE: xóa DB_PORT=3306 (MySQL cũ) nếu còn.
#
# Sau khi backend có URL (vd https://apptd-be.onrender.com), vào service FE sửa:
#   NEXT_PUBLIC_API_URL = https://apptd-be.onrender.com/api/v1
# Và trên BE sửa CORS_ALLOWED_ORIGIN_PATTERNS = URL frontend Render.

databases:
  - name: apptd-postgres
    databaseName: deutsch_db
    user: apptd
    plan: free
    region: singapore

services:
  - type: web
    name: apptd-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: be/Dockerfile
    dockerContext: be
    healthCheckPath: /api/v1/lessons
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: ENFORCE_STRONG_JWT_SECRET
        value: "true"
      - key: FLYWAY_ENABLED
        value: "true"
      - key: JPA_DDL_AUTO
        value: none
      - key: DATABASE_URL
        fromDatabase:
          name: apptd-postgres
          property: connectionString
      - key: PG_SSLMODE
        value: require
      - key: RENDER_POSTGRES_HOST_SUFFIX
        value: singapore-postgres.render.com
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false

  - type: web
    name: apptd-frontend
    runtime: node
    plan: free
    region: singapore
    rootDir: frontend-nextjs
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NEXT_PUBLIC_API_URL
        sync: false
